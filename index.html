<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الردود للمستفيدين | نظام المرافعات الشرعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8b6e;
            --primary-dark: #0d3d2f;
            --secondary: #c9a227;
            --secondary-light: #e6c55a;
            --bg-main: #f8f6f1;
            --bg-card: #ffffff;
            --bg-dark: #1a1a1a;
            --text-primary: #2c2c2c;
            --text-secondary: #5a5a5a;
            --text-light: #8a8a8a;
            --border: #e0ddd5;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.8;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .logo-text h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--secondary-light);
            font-size: 0.85rem;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
            color: #fff;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary-light);
        }

        .stat-label {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* Main Layout */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header h2 {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .card-header .icon {
            font-size: 1.3rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Textarea */
        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.8;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(26, 95, 74, 0.1);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 95, 74, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--primary-dark);
        }

        .btn-secondary:hover {
            background: var(--secondary-light);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* Articles Section */
        .articles-container {
            max-height: 400px;
            overflow-y: auto;
            padding-left: 0.5rem;
        }

        .articles-container::-webkit-scrollbar {
            width: 6px;
        }

        .articles-container::-webkit-scrollbar-track {
            background: var(--bg-main);
            border-radius: 3px;
        }

        .articles-container::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }

        .article-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
            border: 1px solid var(--border);
            border-right: 4px solid var(--primary);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .article-item:hover {
            transform: translateX(-5px);
            box-shadow: var(--shadow);
            border-right-color: var(--secondary);
        }

        .article-item.selected {
            background: linear-gradient(135deg, rgba(26, 95, 74, 0.1) 0%, rgba(26, 95, 74, 0.05) 100%);
            border-right-color: var(--secondary);
        }

        .article-number {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .article-title {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .article-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .article-category {
            display: inline-block;
            background: var(--secondary-light);
            color: var(--primary-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        /* Templates Section */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .template-card {
            background: linear-gradient(135deg, #fefefe 0%, #f8f6f1 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .template-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .template-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .template-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary-dark);
        }

        /* Output Section */
        .output-box {
            background: linear-gradient(135deg, #fafaf8 0%, #fff 100%);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            min-height: 200px;
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            line-height: 2;
            position: relative;
        }

        .output-box:empty::before {
            content: 'سيظهر الرد المقترح هنا...';
            color: var(--text-light);
            font-style: italic;
        }

        .output-actions {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .output-actions button {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .output-actions button:hover {
            background: var(--primary);
            color: #fff;
        }

        /* Saved Responses */
        .saved-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .saved-item {
            background: #f8f9fa;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 0.75rem;
            position: relative;
        }

        .saved-item-preview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .saved-item-date {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.5rem;
        }

        .saved-item-actions {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            display: flex;
            gap: 0.25rem;
        }

        .saved-item-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .saved-item-actions button:hover {
            opacity: 1;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .tab-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            border-radius: 8px 8px 0 0;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-box .search-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .category-btn {
            padding: 0.4rem 0.8rem;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-dark);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Highlighted text */
        .highlight {
            background: linear-gradient(120deg, var(--secondary-light) 0%, var(--secondary-light) 100%);
            background-repeat: no-repeat;
            background-size: 100% 40%;
            background-position: 0 90%;
        }

        /* Loading */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Full Width Section */
        .full-width {
            grid-column: 1 / -1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .header-stats {
                justify-content: center;
            }
            
            .main-container {
                padding: 1rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
            }
        }

        /* Print Styles */
        @media print {
            .header, .btn-group, .tabs, .search-box, .category-filter {
                display: none !important;
            }
            
            .card {
                box-shadow: none;
                break-inside: avoid;
            }
        }

        /* Legal citation style */
        .legal-citation {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, rgba(26, 95, 74, 0.05) 0%, rgba(26, 95, 74, 0.02) 100%);
            border-right: 3px solid var(--primary);
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0 8px 8px 0;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚖️</div>
                <div class="logo-text">
                    <h1>مساعد الردود للمستفيدين</h1>
                    <span>اللوائح التنفيذية لنظام المرافعات الشرعية</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="articlesCount">242</div>
                    <div class="stat-label">مادة نظامية</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="savedCount">0</div>
                    <div class="stat-label">رد محفوظ</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Input Section -->
        <div class="card">
            <div class="card-header">
                <span class="icon">📝</span>
                <h2>رسالة المستفيد</h2>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <label>الصق رسالة المستفيد هنا:</label>
                    <textarea id="beneficiaryMessage" placeholder="مثال: الحاقاً للمذكرة رقم 251934827 بتاريخ 20/6/1447 والتي تم اغلاقها دون حل المشكلة رغم اعتراضي على الإغلاق..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="analyzeMessage()">
                        <span>🔍</span> تحليل الرسالة
                    </button>
                    <button class="btn btn-outline" onclick="clearInput()">
                        <span>🗑️</span> مسح
                    </button>
                </div>
            </div>
        </div>

        <!-- Articles Section -->
        <div class="card">
            <div class="card-header">
                <span class="icon">📚</span>
                <h2>المواد النظامية ذات الصلة</h2>
            </div>
            <div class="card-body">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="articleSearch" placeholder="ابحث في المواد..." oninput="searchArticles()">
                </div>
                <div class="category-filter" id="categoryFilter">
                    <button class="category-btn active" data-category="all">الكل</button>
                </div>
                <div class="articles-container" id="articlesContainer">
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>قم بتحليل رسالة المستفيد لعرض المواد ذات الصلة</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Response Writing Section -->
        <div class="card">
            <div class="card-header">
                <span class="icon">✍️</span>
                <h2>كتابة الرد</h2>
            </div>
            <div class="card-body">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('write')">كتابة</button>
                    <button class="tab-btn" onclick="switchTab('templates')">قوالب جاهزة</button>
                </div>
                
                <div id="writeTab" class="tab-content active">
                    <div class="input-group">
                        <label>اكتب ردك هنا (يمكنك الكتابة بالعامية):</label>
                        <textarea id="userResponse" placeholder="مثال: اخوي راجع موعد الجلسة اللي محدد لك وبتلاقي فيه كل التفاصيل..."></textarea>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="improveLanguage()">
                            <span>✨</span> تحسين الصياغة
                        </button>
                        <button class="btn btn-outline" onclick="addSelectedArticle()">
                            <span>📎</span> إضافة مادة
                        </button>
                    </div>
                </div>
                
                <div id="templatesTab" class="tab-content">
                    <div class="templates-grid" id="templatesGrid"></div>
                </div>
            </div>
        </div>

        <!-- Output Section -->
        <div class="card">
            <div class="card-header">
                <span class="icon">📤</span>
                <h2>الرد النهائي</h2>
            </div>
            <div class="card-body">
                <div class="output-box" id="finalOutput">
                    <div class="output-actions">
                        <button onclick="copyOutput()" title="نسخ">📋</button>
                        <button onclick="saveResponse()" title="حفظ">💾</button>
                    </div>
                </div>
                <div class="btn-group" style="margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="copyOutput()">
                        <span>📋</span> نسخ الرد
                    </button>
                    <button class="btn btn-secondary" onclick="saveResponse()">
                        <span>💾</span> حفظ
                    </button>
                </div>
            </div>
        </div>

        <!-- Saved Responses Section -->
        <div class="card full-width">
            <div class="card-header">
                <span class="icon">📁</span>
                <h2>الردود المحفوظة</h2>
            </div>
            <div class="card-body">
                <div class="saved-list" id="savedList">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>لا توجد ردود محفوظة بعد</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==========================================
        // قاعدة بيانات المواد النظامية
        // ==========================================
        const legalArticles = [
            // الباب الأول: أحكام عامة
            {
                id: "1/1",
                number: "المادة 1/1",
                title: "العمل بالأنظمة السارية",
                text: "يعمل بالأنظمة، والقرارات، والتعليمات السارية الصادرة من مختص والتي لا تتعارض مع هذا النظام.",
                category: "أحكام عامة",
                keywords: ["أنظمة", "قرارات", "تعليمات", "سارية"]
            },
            {
                id: "1/3",
                number: "المادة 1/3",
                title: "المصلحة في الطلب",
                text: "تستظهر الدائرة وجود مصلحة للطالب من جلب نفع أو دفع ضرر، وترد ما لا مصلحة فيه، سواء أكان الطلب أصلياً أم عارضاً.",
                category: "أحكام عامة",
                keywords: ["مصلحة", "طلب", "نفع", "ضرر", "رد"]
            },
            {
                id: "3/3",
                number: "المادة 3/3",
                title: "الاستيثاق للحق",
                text: "يقبل الطلب بالاستيثاق لحق يخشى زوال دليله عند النزاع ولو من غير حضور الخصم الآخر، ومن ذلك: طلب المعاينة لإثبات الحالة أو إثبات شهادة يخشى فواتها، ويكون ذلك وفقاً لأحكام القضاء المستعجل.",
                category: "أحكام عامة",
                keywords: ["استيثاق", "حق", "دليل", "معاينة", "شهادة", "مستعجل"]
            },
            {
                id: "5/3",
                number: "المادة 5/3",
                title: "التعويض عن الضرر",
                text: "للمتضرر من الدعوى المطالبة بالتعويض عما لحقه من ضرر بطلب يقدمه للدائرة أثناء نظر الدعوى، أو بدعوى مستقلة.",
                category: "أحكام عامة",
                keywords: ["تعويض", "ضرر", "دعوى", "مستقلة"]
            },

            // التبليغ
            {
                id: "1/11",

                name: "إغلاق طلب",
                icon: "✅",
                text: "السلام عليكم ورحمة الله وبركاته،\n\nنفيدكم بأنه تم إغلاق طلبكم رقم [رقم الطلب] وذلك بعد اتخاذ الإجراء اللازم بشأنه.\n\nفي حال وجود أي استفسار آخر، يسعدنا تقديم المساعدة.\n\nمع التقدير."
            },
            {
                id: 5,
                name: "رد على اعتراض",
                icon: "⚠️",
                text: "السلام عليكم ورحمة الله وبركاته،\n\nإشارة إلى اعتراضكم المقدم على [موضوع الاعتراض]، نفيدكم بأنه:\n\n[تفاصيل الرد]\n\nوفقاً لما نصت عليه المادة [رقم المادة] من اللوائح التنفيذية لنظام المرافعات الشرعية.\n\nمع التقدير."
            },
            {
                id: 6,
                name: "توضيح إجراء",
                icon: "💡",
                text: "السلام عليكم ورحمة الله وبركاته،\n\nإشارة إلى استفساركم حول [الموضوع]، نوضح لكم ما يلي:\n\n[التوضيح]\n\nآملين أن يكون التوضيح كافياً، وفي حال وجود أي استفسار آخر نسعد بخدمتكم.\n\nمع التقدير."
            },
            {
                id: 7,
                name: "إحالة لجهة أخرى",
                icon: "↗️",
                text: "السلام عليكم ورحمة الله وبركاته،\n\nإشارة إلى طلبكم المقدم، نفيدكم بأن موضوع طلبكم من اختصاص [الجهة المختصة].\n\nيرجى التوجه إليها لاستكمال الإجراء اللازم.\n\nمع التقدير."
            },
            {
                id: 8,
                name: "تبليغ حكم",
                icon: "⚖️",
                text: "السلام عليكم ورحمة الله وبركاته،\n\nنفيدكم بصدور الحكم في الدعوى رقم [رقم الدعوى] بتاريخ [التاريخ].\n\nويمكنكم الاطلاع على صورة الحكم من خلال البوابة الإلكترونية، علماً بأن مدة الاعتراض [المدة] يوماً من تاريخ استلام صورة الحكم.\n\nمع التقدير."
            }
        ];

        // ==========================================
        // المتغيرات العامة
        // ==========================================
        let selectedArticles = [];
        let savedResponses = JSON.parse(localStorage.getItem('savedResponses') || '[]');
        let currentFilter = 'all';

        // ==========================================
        // الدوال الرئيسية
        // ==========================================
        
        // تهيئة التطبيق
        function init() {
            renderTemplates();
            renderSavedResponses();
            renderCategoryFilter();
            updateStats();
        }

        // تحليل رسالة المستفيد
        function analyzeMessage() {
            const message = document.getElementById('beneficiaryMessage').value.trim();
            if (!message) {
                showToast('يرجى إدخال رسالة المستفيد أولاً');
                return;
            }

            // استخراج الكلمات المفتاحية
            const keywords = extractKeywords(message);
            
            // البحث عن المواد ذات الصلة
            const relevantArticles = findRelevantArticles(keywords, message);
            
            // عرض النتائج
            renderArticles(relevantArticles);
            
            // اقتراح رد أولي
            suggestResponse(message, relevantArticles);
            
            showToast(`تم العثور على ${relevantArticles.length} مادة ذات صلة`);
        }

        // استخراج الكلمات المفتاحية
        function extractKeywords(text) {
            const commonKeywords = [
                'تبليغ', 'جلسة', 'موعد', 'حكم', 'استئناف', 'اعتراض', 'شطب',
                'غياب', 'حضور', 'دعوى', 'قضية', 'مذكرة', 'طلب', 'إغلاق',
                'نفقة', 'حضانة', 'زيارة', 'طلاق', 'خلع', 'ورثة', 'وفاة',
                'تنفيذ', 'سفر', 'منع', 'مستعجل', 'تعويض', 'ضرر', 'وكيل',
                'وكالة', 'عنوان', 'بريد', 'إعلان', 'صحف', 'مدة', 'أجل',
                'مرافعة', 'إمهال', 'مهلة', 'تأجيل', 'فسخ', 'صلح', 'مصالحة'
            ];
            
            const found = [];
            const lowerText = text.toLowerCase();
            
            commonKeywords.forEach(keyword => {
                if (lowerText.includes(keyword)) {
                    found.push(keyword);
                }
            });
            
            return found;
        }

        // البحث عن المواد ذات الصلة
        function findRelevantArticles(keywords, fullText) {
            const scored = legalArticles.map(article => {
                let score = 0;
                
                // نقاط للكلمات المفتاحية المطابقة
                keywords.forEach(keyword => {
                    if (article.keywords.some(k => k.includes(keyword) || keyword.includes(k))) {
                        score += 10;
                    }
                    if (article.text.includes(keyword)) {
                        score += 5;
                    }
                    if (article.title.includes(keyword)) {
                        score += 8;
                    }
                });
                
                // نقاط إضافية للتطابق في النص الكامل
                article.keywords.forEach(k => {
                    if (fullText.includes(k)) {
                        score += 3;
                    }
                });
                
                return { ...article, score };
            });
            
            return scored
                .filter(a => a.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, 10);
        }

        // عرض المواد
        function renderArticles(articles) {
            const container = document.getElementById('articlesContainer');
            
            if (articles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>لم يتم العثور على مواد ذات صلة</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = articles.map(article => `
                <div class="article-item" onclick="toggleArticleSelection('${article.id}')" data-id="${article.id}">
                    <span class="article-number">${article.number}</span>
                    <div class="article-title">${article.title}</div>
                    <div class="article-text">${article.text.substring(0, 150)}...</div>
                    <span class="article-category">${article.category}</span>
                </div>
            `).join('');
        }

        // تبديل اختيار المادة
        function toggleArticleSelection(id) {
            const element = document.querySelector(`.article-item[data-id="${id}"]`);
            const index = selectedArticles.indexOf(id);
            
            if (index > -1) {
                selectedArticles.splice(index, 1);
                element.classList.remove('selected');
            } else {
                selectedArticles.push(id);
                element.classList.add('selected');
            }
        }

        // اقتراح رد
        function suggestResponse(message, articles) {
            let response = languageImprovements.openings[0] + '\n\n';
            
            // تحليل نوع الطلب واقتراح رد مناسب
            const lowerMessage = message.toLowerCase();
            
            if (lowerMessage.includes('موعد') || lowerMessage.includes('جلسة')) {
                response += 'بخصوص استفساركم عن موعد الجلسة، نفيدكم بأنه يمكنكم الاطلاع على تفاصيل الموعد المحدد من خلال البوابة الإلكترونية.';
            } else if (lowerMessage.includes('إغلاق') || lowerMessage.includes('اغلاق')) {
                response += 'بخصوص ملاحظتكم على إغلاق الطلب، نفيدكم بأنه قد تم اتخاذ الإجراء اللازم وفقاً للأنظمة المعمول بها.';
            } else if (lowerMessage.includes('تبليغ') || lowerMessage.includes('ابلاغ')) {
                response += 'بخصوص التبليغ، نفيدكم بأن إجراءات التبليغ تتم وفقاً لما نصت عليه اللوائح التنفيذية لنظام المرافعات الشرعية.';
            } else {
                response += 'بخصوص طلبكم المشار إليه، نفيدكم بأنه جارٍ العمل على معالجته وفقاً للإجراءات النظامية المتبعة.';
            }
            
            // إضافة المواد ذات الصلة
            if (articles.length > 0) {
                response += '\n\n📚 السند النظامي:\n';
                articles.slice(0, 3).forEach(article => {
                    response += `\n• ${article.number}: ${article.title}`;
                });
            }
            
            response += languageImprovements.closings[0];
            
            document.getElementById('finalOutput').textContent = response;
        }

        // تحسين الصياغة اللغوية
        function improveLanguage() {
            const input = document.getElementById('userResponse').value.trim();
            if (!input) {
                showToast('يرجى كتابة الرد أولاً');
                return;
            }
            
            let improved = input;
            
            // تحويل العامية للفصحى
            Object.entries(languageImprovements.colloquialToFormal).forEach(([colloquial, formal]) => {
                const regex = new RegExp(colloquial, 'gi');
                improved = improved.replace(regex, formal);
            });
            
            // تحسين المصطلحات القانونية
            Object.entries(languageImprovements.legalTerms).forEach(([term, legal]) => {
                const regex = new RegExp(term, 'gi');
                improved = improved.replace(regex, legal);
            });
            
            // إضافة افتتاحية إذا لم تكن موجودة
            if (!improved.includes('السلام عليكم')) {
                improved = languageImprovements.openings[0] + '\n\n' + improved;
            }
            
            // إضافة خاتمة إذا لم تكن موجودة
            if (!improved.includes('التقدير') && !improved.includes('التحية')) {
                improved += languageImprovements.closings[0];
            }
            
            document.getElementById('finalOutput').textContent = improved;
            showToast('تم تحسين الصياغة بنجاح');
        }

        // إضافة المادة المختارة للرد
        function addSelectedArticle() {
            if (selectedArticles.length === 0) {
                showToast('يرجى اختيار مادة أولاً');
                return;
            }
            
            const output = document.getElementById('finalOutput');
            let currentText = output.textContent;
            
            selectedArticles.forEach(id => {
                const article = legalArticles.find(a => a.id === id);
                if (article) {
                    const citation = `\n\n📌 ${article.number}:\n"${article.text}"`;
                    if (!currentText.includes(article.number)) {
                        currentText += citation;
                    }
                }
            });
            
            output.textContent = currentText;
            showToast('تمت إضافة المواد المختارة');
        }

        // نسخ الرد
        function copyOutput() {
            const output = document.getElementById('finalOutput').textContent;
            if (!output) {
                showToast('لا يوجد رد للنسخ');
                return;
            }
            
            navigator.clipboard.writeText(output).then(() => {
                showToast('تم نسخ الرد بنجاح ✓');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = output;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('تم نسخ الرد بنجاح ✓');
            });
        }

        // حفظ الرد
        function saveResponse() {
            const output = document.getElementById('finalOutput').textContent;
            if (!output) {
                showToast('لا يوجد رد للحفظ');
                return;
            }
            
            const response = {
                id: Date.now(),
                text: output,
                date: new Date().toLocaleDateString('ar-SA'),
                preview: output.substring(0, 100)
            };
            
            savedResponses.unshift(response);
            localStorage.setItem('savedResponses', JSON.stringify(savedResponses));
            
            renderSavedResponses();
            updateStats();
            showToast('تم حفظ الرد بنجاح ✓');
        }

        // عرض الردود المحفوظة
        function renderSavedResponses() {
            const container = document.getElementById('savedList');
            
            if (savedResponses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>لا توجد ردود محفوظة بعد</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = savedResponses.map(response => `
                <div class="saved-item">
                    <div class="saved-item-actions">
                        <button onclick="loadSavedResponse(${response.id})" title="تحميل">📂</button>
                        <button onclick="deleteSavedResponse(${response.id})" title="حذف">🗑️</button>
                    </div>
                    <div class="saved-item-preview">${response.preview}...</div>
                    <div class="saved-item-date">${response.date}</div>
                </div>
            `).join('');
        }

        // تحميل رد محفوظ
        function loadSavedResponse(id) {
            const response = savedResponses.find(r => r.id === id);
            if (response) {
                document.getElementById('finalOutput').textContent = response.text;
                showToast('تم تحميل الرد');
            }
        }

        // حذف رد محفوظ
        function deleteSavedResponse(id) {
            savedResponses = savedResponses.filter(r => r.id !== id);
            localStorage.setItem('savedResponses', JSON.stringify(savedResponses));
            renderSavedResponses();
            updateStats();
            showToast('تم حذف الرد');
        }

        // عرض القوالب
        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = responseTemplates.map(template => `
                <div class="template-card" onclick="useTemplate(${template.id})">
                    <div class="template-icon">${template.icon}</div>
                    <div class="template-name">${template.name}</div>
                </div>
            `).join('');
        }

        // استخدام قالب
        function useTemplate(id) {
            const template = responseTemplates.find(t => t.id === id);
            if (template) {
                document.getElementById('finalOutput').textContent = template.text;
                switchTab('write');
                showToast('تم تحميل القالب');
            }
        }

        // عرض فلتر الفئات
        function renderCategoryFilter() {
            const categories = [...new Set(legalArticles.map(a => a.category))];
            const container = document.getElementById('categoryFilter');
            
            container.innerHTML = `
                <button class="category-btn active" data-category="all" onclick="filterByCategory('all')">الكل</button>
                ${categories.map(cat => `
                    <button class="category-btn" data-category="${cat}" onclick="filterByCategory('${cat}')">${cat}</button>
                `).join('')}
            `;
        }

        // فلترة حسب الفئة
        function filterByCategory(category) {
            currentFilter = category;
            
            // تحديث الأزرار
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });
            
            // فلترة المواد
            const filtered = category === 'all' 
                ? legalArticles 
                : legalArticles.filter(a => a.category === category);
            
            renderArticles(filtered);
        }

        // البحث في المواد
        function searchArticles() {
            const query = document.getElementById('articleSearch').value.trim().toLowerCase();
            
            if (!query) {
                filterByCategory(currentFilter);
                return;
            }
            
            const results = legalArticles.filter(article => 
                article.text.toLowerCase().includes(query) ||
                article.title.toLowerCase().includes(query) ||
                article.number.toLowerCase().includes(query) ||
                article.keywords.some(k => k.includes(query))
            );
            
            renderArticles(results);
        }

        // تبديل التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(tab === 'write' ? 'كتابة' : 'قوالب'));
            });
            
            document.getElementById('writeTab').classList.toggle('active', tab === 'write');
            document.getElementById('templatesTab').classList.toggle('active', tab === 'templates');
        }

        // مسح الإدخال
        function clearInput() {
            document.getElementById('beneficiaryMessage').value = '';
            document.getElementById('userResponse').value = '';
            document.getElementById('finalOutput').textContent = '';
            selectedArticles = [];
            
            document.querySelectorAll('.article-item').forEach(el => {
                el.classList.remove('selected');
            });
            
            showToast('تم مسح البيانات');
        }

        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('savedCount').textContent = savedResponses.length;
        }

        // إظهار التنبيه
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // تهيئة التطبيق عند التحميل
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
